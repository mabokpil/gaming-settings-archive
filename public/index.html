<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>게이밍 커스텀 세팅 보관소</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>🎮 Gaming Settings Archive</h1>

      <div class="input-section">
        <input
          type="text"
          id="gameName"
          placeholder="게임 이름 (예: 배그, 롤)"
        />
        <input
          type="number"
          id="mouseDpi"
          placeholder="마우스 DPI (예: 1600)"
        />
        <input type="text" id="sensitivity" placeholder="인게임 감도" />
        <select id="gripStyle">
          <option value="Palm">팜 그립 (Palm)</option>
          <option value="Claw">클로 그립 (Claw)</option>
          <option value="Fingertip">핑거팁 (Fingertip)</option>
        </select>
        <button onclick="saveSetting()">세팅 저장하기</button>
      </div>

      <hr />
      <div id="settingsList" class="settings-list"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
